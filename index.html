
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CareerSage - AI Career Counselor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Lora:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
    <style>
      :root {
        --brand-950: #022c22;
        --brand-900: #064e3b;
        --brand-800: #065f46;
        --brand-700: #047857;
        --brand-600: #059669;
        --brand-500: #10b981;
        --brand-400: #34d399;
        --brand-100: #d1fae5;
        --brand-50:  #ecfdf5;

        --amber-900: #78350f;
        --amber-700: #b45309;
        --amber-500: #f59e0b;
        --amber-100: #fef3c7;
        --amber-50:  #fffbeb;

        --surface: #fdfcf9;
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(255, 255, 255, 0.55);
        --shadow-brand: 0 4px 24px -4px rgba(6, 95, 70, 0.14);
        --shadow-card: 0 4px 12px -2px rgba(0, 0, 0, 0.06), 0 2px 4px -1px rgba(0, 0, 0, 0.04);
      }

      * { box-sizing: border-box; }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--surface);
        margin: 0;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Background ─────────────────────────────── */
      .mesh-bg {
        position: fixed;
        inset: 0;
        z-index: -1;
        background:
          radial-gradient(at 0% 0%,   hsla(152, 45%, 92%, 0.9) 0, transparent 55%),
          radial-gradient(at 100% 0%,  hsla(38,  50%, 94%, 0.8) 0, transparent 55%),
          radial-gradient(at 50% 100%, hsla(160, 35%, 93%, 0.7) 0, transparent 55%);
        background-color: #fdfcf9;
      }

      .mesh-blob {
        position: fixed;
        filter: blur(90px);
        z-index: -1;
        border-radius: 50%;
        animation: blob-float 14s infinite ease-in-out;
      }

      .blob-1 {
        top: -12%;
        left: -12%;
        width: 55vw;
        height: 55vw;
        background: radial-gradient(circle, rgba(52, 211, 153, 0.22) 0%, rgba(16, 185, 129, 0.10) 60%, transparent 100%);
        animation-delay: 0s;
        animation-duration: 16s;
      }
      .blob-2 {
        bottom: -15%;
        right: -10%;
        width: 50vw;
        height: 50vw;
        background: radial-gradient(circle, rgba(245, 158, 11, 0.18) 0%, rgba(251, 191, 36, 0.08) 60%, transparent 100%);
        animation-delay: 3s;
        animation-duration: 18s;
      }
      .blob-3 {
        top: 35%;
        left: 38%;
        width: 35vw;
        height: 35vw;
        background: radial-gradient(circle, rgba(16, 185, 129, 0.10) 0%, transparent 70%);
        animation-delay: 6s;
        animation-duration: 12s;
      }

      @keyframes blob-float {
        0%, 100% { transform: translate(0, 0) scale(1); }
        25%       { transform: translate(20px, -40px) scale(1.06); }
        50%       { transform: translate(-15px, 15px) scale(0.96); }
        75%       { transform: translate(25px, 30px) scale(1.04); }
      }

      /* ── Scrollbar ──────────────────────────────── */
      ::-webkit-scrollbar        { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track  { background: transparent; }
      ::-webkit-scrollbar-thumb  { background: #cbd5e1; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

      /* ── Animations ─────────────────────────────── */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-fadeIn {
        animation: fadeIn 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        will-change: transform, opacity;
      }

      @keyframes fadeSlideIn {
        0%   { opacity: 0; transform: translateY(16px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      .animate-fadeSlideIn {
        animation: fadeSlideIn 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes bounce-slow {
        0%, 100% { transform: translateY(-6%); }
        50%       { transform: translateY(6%); }
      }
      .animate-bounce-slow {
        animation: bounce-slow 3.2s infinite ease-in-out;
      }

      @keyframes shimmer {
        0%   { background-position: -200% center; }
        100% { background-position:  200% center; }
      }
      .animate-shimmer {
        background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.4) 50%, transparent 100%);
        background-size: 200% auto;
        animation: shimmer 2s linear infinite;
      }

      @keyframes spin-slow {
        to { transform: rotate(360deg); }
      }
      .animate-spin-slow {
        animation: spin-slow 3s linear infinite;
      }

      /* ── Glass Utilities ────────────────────────── */
      .glass-panel {
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.55);
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.62);
        box-shadow: 0 4px 16px -4px rgba(0, 0, 0, 0.06), 0 1px 4px rgba(0,0,0,0.04);
        transition: transform 0.25s ease, box-shadow 0.25s ease;
      }
      .glass-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 28px -6px rgba(0, 0, 0, 0.09), 0 4px 8px rgba(0,0,0,0.04);
      }

      /* Premium solid card */
      .solid-card {
        background: #ffffff;
        border: 1px solid rgba(0, 0, 0, 0.06);
        box-shadow: 0 4px 16px -4px rgba(0, 0, 0, 0.08), 0 1px 3px rgba(0,0,0,0.04);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .solid-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 24px -6px rgba(0, 0, 0, 0.10);
      }

      /* ── Brand Utilities ────────────────────────── */
      .brand-gradient {
        background: linear-gradient(135deg, var(--brand-800) 0%, var(--brand-600) 100%);
      }
      .brand-text-gradient {
        background: linear-gradient(135deg, var(--brand-900) 0%, var(--brand-600) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .amber-text-gradient {
        background: linear-gradient(135deg, var(--amber-900) 0%, var(--amber-500) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* ── Typography ─────────────────────────────── */
      .font-serif { font-family: 'Lora', Georgia, serif; }

      /* ── Misc ───────────────────────────────────── */
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      .no-scrollbar::-webkit-scrollbar { display: none; }

      /* Dot pattern overlay (subtle texture) */
      .dot-pattern {
        background-image: radial-gradient(circle, rgba(6,95,70,0.06) 1px, transparent 1px);
        background-size: 22px 22px;
      }

      /* Focus ring */
      *:focus-visible {
        outline: 2px solid var(--brand-500);
        outline-offset: 2px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
</head>
  <body>
    <div class="mesh-bg"></div>
    <div class="mesh-blob blob-1"></div>
    <div class="mesh-blob blob-2"></div>
    <div class="mesh-blob blob-3"></div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
